<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilih Foto</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}

h2 {
  text-align: center;
  padding: 15px;
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  padding: 10px;
}

.item {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
}

.item img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  cursor: pointer;
}

.checkbox {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 18px;
  height: 18px;
}

.selected {
  border: 3px solid #0ea5e9;
}

/* FLOAT WA */
.wa-btn {
  position: fixed;
  bottom: 70px;
  right: 20px;
  background: #25D366;
  color: white;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* COUNT BAR */
.count-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #0ea5e9;
  color: white;
  text-align: center;
  padding: 10px;
  font-weight: bold;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.modal img {
  max-width: 90%;
  max-height: 80%;
}

.modal button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: #0ea5e9;
  color: white;
  cursor: pointer;
}

.close {
  position: absolute;
  top: 20px;
  right: 25px;
  font-size: 30px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Pilih Foto</h2>

<div id="gallery" class="gallery"></div>

<div class="count-bar" id="count">Dipilih: 0</div>
<div class="wa-btn" onclick="kirimWA()">📤</div>

<div class="modal" id="modal">
  <span class="close" onclick="closeModal()">×</span>
  <img id="modalImg">
  <button onclick="toggleSelectFromModal()">Pilih Foto</button>
</div>

<script>
const API_KEY = "AIzaSyCiE8qwQ_IU_xtWZaby0OL272_VApROZv8";
const NO_WA = "6285158568611";

const params = new URLSearchParams(window.location.search);
const FOLDER_ID = params.get("folder");

let selected = [];
let currentFile = null;

async function loadPhotos() {
  const gallery = document.getElementById("gallery");

  let pageToken = "";
  let allFiles = [];

  do {
    const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents&pageSize=1000&fields=nextPageToken,files(id,name,mimeType)&key=${API_KEY}${pageToken ? `&pageToken=${pageToken}` : ""}`;

    const res = await fetch(url);
    const data = await res.json();

    allFiles = allFiles.concat(data.files);
    pageToken = data.nextPageToken;

  } while (pageToken);

  allFiles.forEach(file => {
    if (file.mimeType.includes("image")) {

      const div = document.createElement("div");
      div.className = "item";

      const img = document.createElement("img");
      img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1000`;
      img.alt = file.name;

      img.onclick = () => openModal(file, img.src);

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.className = "checkbox";

      checkbox.onchange = () => {
        toggleSelect(file, div, checkbox);
      };

      div.appendChild(img);
      div.appendChild(checkbox);
      gallery.appendChild(div);
    }
  });
}

function toggleSelect(file, div, checkbox) {
  const exist = selected.find(x => x.id === file.id);

  if (checkbox.checked) {
    if (!exist) selected.push(file);
    div.classList.add("selected");
  } else {
    selected = selected.filter(x => x.id !== file.id);
    div.classList.remove("selected");
  }

  updateCount();
}

function updateCount() {
  document.getElementById("count").innerText = "Dipilih: " + selected.length;
}

function openModal(file, src) {
  currentFile = file;
  document.getElementById("modalImg").src = src;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function toggleSelectFromModal() {
  const items = document.querySelectorAll(".item");

  items.forEach(item => {
    const img = item.querySelector("img");
    const checkbox = item.querySelector("input");

    if (img.alt === currentFile.name) {
      checkbox.checked = !checkbox.checked;
      toggleSelect(currentFile, item, checkbox);
    }
  });

  closeModal();
}

function kirimWA() {
  if (selected.length === 0) {
    alert("Belum pilih foto!");
    return;
  }

  const list = selected.map((f, i) => `${i+1}. ${f.name}`).join("\n");

  const text = "Halo, saya memilih foto berikut:\n\n" + list;

  const url = `https://wa.me/${NO_WA}?text=${encodeURIComponent(text)}`;

  window.open(url, "_blank");
}

loadPhotos();
</script>

</body>
</html>
